<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayatori Embed Sample</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; font-family: "Noto Sans JP", sans-serif; background: #f8fafc; color: #111827; }
    .page { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .title { font-size: 14px; font-weight: 700; }
    .status {
      margin-left: auto;
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid #bbf7d0;
      color: #15803d;
      background: #dcfce7;
    }
    .status.changed {
      border-color: #fecaca;
      color: #b91c1c;
      background: #fee2e2;
    }
    .container { flex: 1; min-height: 0; }
    select, button {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      background: #fff;
      color: #111827;
    }
    button.primary {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <span class="title">Ayatori 埋め込み版サンプル</span>
      <select id="sample-select">
        <option value="simple-flow.yaml">simple-flow.yaml</option>
        <option value="asis-flow.yaml">asis-flow.yaml</option>
      </select>
      <button id="reload-btn">サンプル再読込</button>
      <button id="download-btn" class="primary">現在のYAMLをダウンロード</button>
      <span id="status" class="status">● 変更なし</span>
    </div>
    <div id="root" class="container"></div>
  </div>

  <script src="../ayatori.iife.js"></script>
  <script>
    const root = document.getElementById("root");
    const statusEl = document.getElementById("status");
    const selectEl = document.getElementById("sample-select");
    const reloadBtn = document.getElementById("reload-btn");
    const downloadBtn = document.getElementById("download-btn");

    let instance = null;
    let baseYaml = "";

    function updateStatus(currentYaml) {
      const changed = currentYaml !== baseYaml;
      statusEl.textContent = changed ? "● 変更あり" : "● 変更なし";
      statusEl.classList.toggle("changed", changed);
    }

    function downloadCurrentYaml() {
      if (!instance) return;
      const yaml = instance.getYaml();
      const blob = new Blob([yaml], { type: "text/yaml" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "embed-sample-current.yaml";
      a.click();
      URL.revokeObjectURL(url);
    }

    async function loadSample(filename) {
      const res = await fetch(`../sample-flows/${filename}`);
      if (!res.ok) throw new Error(`failed to load sample: ${res.status}`);
      const yaml = (await res.text()).trim();
      baseYaml = yaml;

      if (instance) {
        instance.destroy();
      }

      instance = Ayatori.render({
        container: root,
        yaml,
        editable: true,
        theme: "light",
        onYamlChange: (newYaml) => {
          updateStatus(newYaml);
        },
      });

      updateStatus(baseYaml);
    }

    reloadBtn.addEventListener("click", () => {
      loadSample(selectEl.value).catch((err) => {
        window.alert(String(err));
      });
    });

    downloadBtn.addEventListener("click", () => {
      downloadCurrentYaml();
    });

    loadSample(selectEl.value).catch((err) => {
      window.alert(String(err));
    });
  </script>
</body>
</html>
