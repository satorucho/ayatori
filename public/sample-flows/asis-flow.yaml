meta:
  name: AsIs 管理者と注文者の体験フロー
  purpose: 弁当注文サービスの導入から月次運用が完了するまで
  granularity: business
  version: 2026-03-13
  subtitle: PF導入→日次運用→月次運用の全体フロー
lanes:
  - id: lane-admin
    label: 管理者
  - id: lane-orderer
    label: 注文者
phases:
  - id: phase-a
    label: Phase A：導入・登録（初回のみ）
  - id: phase-b
    label: Phase B：日次運用（時間軸で進行）
  - id: phase-c
    label: Phase C：月次運用
nodes:
  - id: n-start
    type: start
    label: PF導入
    lane: lane-admin
    phase: phase-a
  - id: n-a1
    type: process
    label: 費用負担パターンを設定する
    lane: lane-admin
    phase: phase-a
  - id: n-a2
    type: process
    label: コード/QRを配布する
    lane: lane-admin
    phase: phase-a
  - id: n-a3
    type: process
    label: ユーザー登録する
    lane: lane-orderer
    phase: phase-a
  - id: n-a4
    type: process
    label: 登録状況を確認・無効化する
    lane: lane-admin
    sublabel: 退職者アカウント無効化含む
    phase: phase-a
  - id: n-b1
    type: process
    label: 休みカレンダーを設定する
    lane: lane-admin
    phase: phase-b
    timeLabel: 2日以上前
  - id: n-b2
    type: process
    label: 事前予約する（仮押さえ）
    lane: lane-orderer
    phase: phase-b
    timeLabel: 2日以上前
  - id: n-b3
    type: process
    label: 注文状況を確認・照合する
    lane: lane-admin
    sublabel: 注文一覧印刷→検品
    phase: phase-b
    timeLabel: 前日
  - id: n-b4
    type: process
    label: 最終確認/前日締切品の確定
    lane: lane-orderer
    phase: phase-b
    timeLabel: 前日
  - id: n-b5
    type: process
    label: 当日注文/最終キャンセル
    lane: lane-orderer
    sublabel: 決済（該当時）
    phase: phase-b
    timeLabel: 当日朝〜締切
  - id: n-b6
    type: manual
    label: 変更・キャンセル
    lane: lane-orderer
    sublabel: PF不可→電話で玉子屋に連絡
    phase: phase-b
    timeLabel: 締切後
  - id: n-b7
    type: process
    label: リマインド/通知を受け取る
    lane: lane-orderer
    phase: phase-b
  - id: n-b-end
    type: end
    label: 弁当受取り
    lane: lane-orderer
    phase: phase-b
  - id: n-c1
    type: process
    label: 請求・利用実績を確認する
    lane: lane-admin
    phase: phase-c
  - id: n-c2
    type: process
    label: 金額を照合する
    lane: lane-admin
    phase: phase-c
  - id: n-c3
    type: process
    label: 注文実績データを抽出する
    lane: lane-admin
    phase: phase-c
edges:
  - id: ea1
    source: n-start
    target: n-a1
  - id: ea2
    source: n-a1
    target: n-a2
  - id: ea3
    source: n-a2
    target: n-a3
  - id: ea4
    source: n-a3
    target: n-a4
  - id: eb1
    source: n-a4
    target: n-b1
  - id: eb2
    source: n-b1
    target: n-b2
  - id: eb3
    source: n-b2
    target: n-b3
  - id: eb4
    source: n-b3
    target: n-b4
  - id: eb5
    source: n-b4
    target: n-b5
  - id: eb6
    source: n-b5
    target: n-b6
  - id: eb7
    source: n-b5
    target: n-b7
  - id: eb8
    source: n-b7
    target: n-b-end
  - id: ec1
    source: n-a4
    target: n-c1
  - id: ec2
    source: n-c1
    target: n-c2
  - id: ec3
    source: n-c2
    target: n-c3
designNotes:
  - Phase A は初回のみ実行。Phase Bは日次、Phase Cは月次
  - 注文者の月次運用は操作なし（テキスト注釈で対応）
openQuestions:
  - 締切後の変更・キャンセルフローの詳細は要確認
