name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build app
        run: npx tsc -b && npx vite build --base=${{ steps.pages.outputs.base_path }}

      - name: Build IIFE bundle
        run: npm run build:lib

      - name: Copy IIFE bundle into dist
        run: cp dist-lib/ayatori.iife.js dist/

      - name: Ensure static resources are included
        run: cp -R public/. dist/

      - name: Verify required static resources
        run: |
          test -f dist/logo.svg
          test -f dist/logo_sm.svg
          test -f dist/sample-flows/simple-flow.yaml
          test -f dist/sample-flows/asis-flow.yaml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
