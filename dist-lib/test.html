<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayatori Library Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    #root { width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./ayatori.iife.js"></script>
  <script>
    const yaml = `
meta:
  name: 簡単な承認フロー
  purpose: 申請の承認が完了するまで
  granularity: business
  version: 2026-03-14
lanes:
  - id: lane-applicant
    label: 申請者
  - id: lane-approver
    label: 承認者
nodes:
  - id: n1
    type: start
    label: 申請開始
    lane: lane-applicant
  - id: n2
    type: process
    label: 申請書を作成する
    lane: lane-applicant
    sublabel: 申請システム
  - id: n3
    type: decision
    label: |-
      内容に
      不備はないか
    lane: lane-approver
    decisionMeta:
      branchNumber: 1
  - id: n4
    type: process
    label: 差し戻す
    lane: lane-approver
    style: orange
  - id: n5
    type: process
    label: 承認する
    lane: lane-approver
    sublabel: 申請システム
  - id: n6
    type: end
    label: 完了
    lane: lane-approver
edges:
  - id: e1
    source: n1
    target: n2
  - id: e2
    source: n2
    target: n3
  - id: e3
    source: n3
    target: n4
    type: no
  - id: e4
    source: n3
    target: n5
    type: yes
  - id: e5
    source: n5
    target: n6
`;

    Ayatori.render({
      container: document.getElementById('root'),
      yaml: yaml.trim(),
      editable: true,
      theme: 'light',
    });
  </script>
</body>
</html>
